<div class="tab-container">
  <a routerLink="/pages/cdud" 
     routerLinkActive="active" 
     class="tab-item">
    Cài đặt ứng dụng
  </a>

  <a routerLink="/pages/qthp" 
     routerLinkActive="active" 
     class="tab-item">
    Quy trình hoàn phí
  </a>

  <a routerLink="/pages/chtg" 
     routerLinkActive="active" 
     class="tab-item">
    Câu hỏi thường gặp
  </a>

  <a routerLink="/pages/qtdk" 
     routerLinkActive="active" 
     class="tab-item">
    Quy trình đi khám
  </a>
</div>

<div class="container">
  <div class="sidebar">
    <h3>Danh sách câu hỏi</h3>
    <ul>
      <li *ngFor="let item of categories" 
          [className]="currentCategory === item.key ? 'active' : ''">
        <a href="javascript:void(0)" (click)="selectCategory(item.key)">
          {{ item.value }}
        </a>
      </li>
    </ul>
  </div>

  <div class="faq-list">
    <div class="faq-item" *ngFor="let question of faqData[currentCategory]">
      <span>{{ question }}</span>
      <div class="arrow">&gt;</div>
    </div>
  </div>
</div>

<section class="support-container">
  <div class="support-left">
    <img src="assets/images/header/anhbia.jpg" alt="Doctor" class="doctor-img">
  </div>

  <div class="support-right">
    <h2>CÁC HÌNH THỨC HỖ TRỢ</h2>
    <p class="hotline">1900-2005</p>

    <div class="qr-group">
      <div class="qr-item">
        <img src="assets/images/header/qrZalo.jpg" alt="QR Zalo">
        <p>Zalo</p>
      </div>
      <div class="qr-item">
        <img src="assets/images/header/qrFB.jpg" alt="QR Facebook">
        <p>Facebook</p>
      </div>
    </div>
  </div>
</section>
